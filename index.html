<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Samsung Spain Clock</title>
    <style>
        :root { --samsung-blue: #1428A0; }
        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            color: #fff;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
            overflow: hidden;
        }
        .logo { font-size: 4vw; letter-spacing: 0.5vw; margin-bottom: 2vh; font-weight: 800; opacity: 0.8; }
        .time-display { display: flex; align-items: baseline; font-weight: 700; }
        #main-time { font-size: 25vw; letter-spacing: -1vw; line-height: 0.9; }
        #seconds { font-size: 10vw; color: var(--samsung-blue); margin-left: 1.5vw; font-weight: 200; text-shadow: 0 0 20px rgba(20, 40, 160, 0.6); }
        #date-display { font-size: 2.5vw; margin-top: 3vh; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.5vw; }
        
        /* Fullscreen Button */
        #fs-btn {
            position: fixed; bottom: 20px; right: 20px; padding: 10px 20px;
            background: rgba(255,255,255,0.1); border: 1px solid #666; color: #fff;
            border-radius: 20px; cursor: pointer; z-index: 99;
        }
        /* Automatically hide button if browser successfully enters fullscreen */
        :fullscreen #fs-btn, :-webkit-full-screen #fs-btn { display: none; }
    </style>
</head>
<body>
    <button id="fs-btn" onclick="goFull()">FULLSCREEN</button>
    <div class="logo">SAMSUNG</div>
    <div class="time-display">
        <span id="main-time">00:00</span>
        <span id="seconds">00</span>
    </div>
    <div id="date-display">ESPAÑA</div>

    <script>
        function updateClock() {
            const now = new Date();
            // Force Spain Time (Madrid)
            const formatter = new Intl.DateTimeFormat('en-GB', {
                timeZone: 'Europe/Madrid', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
            });
            const parts = formatter.formatToParts(now);
            const h = parts.find(p => p.type === 'hour').value;
            const m = parts.find(p => p.type === 'minute').value;
            const s = parts.find(p => p.type === 'second').value;

            document.getElementById('main-time').textContent = `${h}:${m}`;
            document.getElementById('seconds').textContent = s;

            const dateStr = now.toLocaleDateString('es-ES', { weekday: 'long', month: 'long', day: 'numeric', timeZone: 'Europe/Madrid' });
            document.getElementById('date-display').textContent = dateStr;
        }

        function goFull() {
            const el = document.documentElement;
            // Support for various browser engines (Tizen uses Webkit)
            const rfs = el.requestFullscreen || el.webkitRequestFullScreen || el.mozRequestFullScreen || el.msRequestFullscreen;
            if (rfs) rfs.call(el);
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
