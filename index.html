<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samsung Spain Clock</title>
    <style>
        :root { --samsung-blue: #1428A0; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            font-family: Arial, sans-serif;
            overflow: hidden;
            /* Force zoom out for TV browsers that scale too large */
            zoom: 0.8; 
        }
        .logo { font-size: 40px; letter-spacing: 10px; margin-bottom: 10px; font-weight: 800; opacity: 0.9; }
        .time-display { display: flex; align-items: baseline; font-weight: 700; }
        #main-time { font-size: 200px; letter-spacing: -5px; line-height: 1; }
        #seconds { font-size: 80px; color: var(--samsung-blue); margin-left: 20px; font-weight: 200; }
        #date-display { font-size: 35px; margin-top: 20px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 5px; }
        
        #fs-btn {
            position: fixed; bottom: 40px; right: 40px; padding: 15px 30px;
            background: rgba(255,255,255,0.1); border: 1px solid #fff; color: #fff;
            border-radius: 50px; cursor: pointer; font-size: 18px; z-index: 100;
        }
    </style>
</head>
<body>
    <button id="fs-btn" onclick="toggleFS()">FULLSCREEN</button>
    <div class="logo">SAMSUNG</div>
    <div class="time-display">
        <span id="main-time">00:00</span>
        <span id="seconds">00</span>
    </div>
    <div id="date-display">LOADING...</div>

    <script>
        function updateClock() {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            
            // Spain Offset: Mar-Oct is +2, Nov-Feb is +1
            const month = now.getMonth();
            const offset = (month > 2 && month < 10) ? 2 : 1;
            const spainDate = new Date(utc + (3600000 * offset));

            const h = String(spainDate.getHours()).padStart(2, '0');
            const m = String(spainDate.getMinutes()).padStart(2, '0');
            const s = String(spainDate.getSeconds()).padStart(2, '0');

            document.getElementById('main-time').textContent = h + ":" + m;
            document.getElementById('seconds').textContent = s;

            const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
            const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            
            const dateText = days[spainDate.getDay()] + ", " + months[spainDate.getMonth()] + " " + spainDate.getDate();
            document.getElementById('date-display').textContent = dateText;
        }

        function toggleFS() {
            const doc = window.document;
            const docEl = doc.documentElement;
            const requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
            const cancelFullScreen = doc.exitFullscreen || doc.mozCancelFullScreen || doc.webkitExitFullscreen || doc.msExitFullscreen;

            if(!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
                requestFullScreen.call(docEl);
            } else {
                cancelFullScreen.call(doc);
            }
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
