<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Samsung Elite Dashboard</title>
    <style>
        :root {
            --samsung-blue: #1428A0;
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
        }

        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: "SamsungOne", "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            animation: fadeIn 2s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Modernized Logo Style */
        .logo-container h1 {
            font-size: 5vw;
            letter-spacing: 0.5vw;
            margin: 0 0 2vh 0;
            font-weight: 800;
            background: linear-gradient(to bottom, #ffffff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(20, 40, 160, 0.4));
        }

        /* Time Container */
        .time-display {
            display: flex;
            align-items: baseline;
            font-weight: 700;
        }

        #main-time {
            font-size: 25vw;
            letter-spacing: -1vw;
            line-height: 0.9;
        }

        #seconds {
            font-size: 10vw;
            color: var(--samsung-blue);
            margin-left: 1.5vw;
            font-weight: 200;
            /* Glow effect for seconds */
            text-shadow: 0 0 30px rgba(20, 40, 160, 0.8);
        }

        /* Date Footer */
        #date-display {
            font-size: 2.5vw;
            margin-top: 3vh;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.6vw;
            font-weight: 400;
        }

        /* Subtle moving background effect */
        .bg-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(20, 40, 160, 0.1) 0%, transparent 70%);
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <div class="logo-container">
       <h1>SAMSUNG</h1>
    </div>

    <div class="time-display">
        <span id="main-time">00:00</span>
        <span id="seconds">00</span>
    </div>

    <div id="date-display">LOADING...</div>

    <script>
        function updateClock() {
            const now = new Date();
            
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('main-time').textContent = `${h}:${m}`;
            document.getElementById('seconds').textContent = s;

            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            document.getElementById('date-display').textContent = now.toLocaleDateString('en-US', options);
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
