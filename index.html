<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Samsung Spain Clock</title>
    <style>
        :root { --samsung-blue: #1428A0; }
        * { box-sizing: border-box; }
        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            color: #fff;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            font-family: "Segoe UI", Roboto, Arial, sans-serif;
            overflow: hidden;
        }
        .logo { font-size: 4vmin; letter-spacing: 0.8vmin; margin-bottom: 1vh; font-weight: 800; opacity: 0.9; }
        .time-display { display: flex; align-items: baseline; font-weight: 700; }
        #main-time { font-size: 22vmin; letter-spacing: -1vmin; line-height: 1; }
        #seconds { font-size: 9vmin; color: var(--samsung-blue); margin-left: 1.5vmin; font-weight: 200; }
        #date-display { font-size: 2.8vmin; margin-top: 2vh; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.4vmin; }
        
        #fs-btn {
            position: fixed; bottom: 30px; right: 30px; padding: 12px 24px;
            background: rgba(255,255,255,0.1); border: 1px solid #fff; color: #fff;
            border-radius: 30px; cursor: pointer; font-size: 1.5vmin; z-index: 100;
        }
        /* Automatically hides if the TV browser accepts the command */
        :fullscreen #fs-btn, :-webkit-full-screen #fs-btn { display: none; }
    </style>
</head>
<body>
    <button id="fs-btn" onclick="goFull()">FULLSCREEN</button>
    <div class="logo">SAMSUNG</div>
    <div class="time-display">
        <span id="main-time">00:00</span>
        <span id="seconds">00</span>
    </div>
    <div id="date-display">LOADING...</div>

    <script>
        function updateClock() {
            const now = new Date();
            // Force Spain Time calculation (Manual offset)
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            
            // Check for Daylight Savings in Spain (usually last Sunday of March to last Sunday of Oct)
            const offset = (new Date().getMonth() > 2 && new Date().getMonth() < 10) ? 2 : 1;
            const spainDate = new Date(utc + (3600000 * offset));

            const h = String(spainDate.getHours()).padStart(2, '0');
            const m = String(spainDate.getMinutes()).padStart(2, '0');
            const s = String(spainDate.getSeconds()).padStart(2, '0');

            document.getElementById('main-time').textContent = `${h}:${m}`;
            document.getElementById('seconds').textContent = s;

            // Date in English
            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            document.getElementById('date-display').textContent = spainDate.toLocaleDateString('en-US', options);
        }

        function goFull() {
            const el = document.documentElement;
            const rfs = el.requestFullscreen || el.webkitRequestFullScreen || el.mozRequestFullScreen || el.msRequestFullscreen;
            if (rfs) rfs.call(el);
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
