<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Samsung Premium Clock</title>
    <style>
        :root {
            --samsung-blue: #1428A0;
            --bg-color: #000000;
        }
        body {
            background-color: var(--bg-color);
            color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: "SamsungOne", "Segoe UI", Roboto, Arial, sans-serif;
            overflow: hidden;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
        }
        /* Massive Samsung Logo */
        .logo-container {
            width: 50%;
            max-width: 800px;
            margin-bottom: 4vh;
            opacity: 0.9;
        }
        .samsung-logo {
            fill: #ffffff; /* White logo for high contrast on black */
            width: 100%;
        }
        /* Time Container */
        .time-display {
            display: flex;
            align-items: baseline;
            font-weight: 700;
            line-height: 1;
        }
        #main-time {
            font-size: 22vw; /* Dynamically scales to TV size */
            letter-spacing: -0.05em;
        }
        #seconds {
            font-size: 8vw;
            color: var(--samsung-blue);
            margin-left: 20px;
            font-weight: 300;
            transition: all 0.5s ease;
        }
        /* Date Footer */
        #date-display {
            font-size: 3vw;
            margin-top: 20px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.3em;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <!-- Official Samsung Wordmark SVG -->
        <svg class="samsung-logo" viewBox="0 0 512 87" xmlns="http://w3.org">
            <path d="M110.1 7.2c-5.7-1.1-13.3-1.8-21.7-1.8-13.8 0-25.2 2.2-31.5 5.8-6 3.4-9.3 8.3-9.3 14.2 0 10.9 10.9 17.1 30.1 21.6 15.3 3.5 21.7 5.9 21.7 10.4 0 4.7-6.9 7.6-18.7 7.6-11.4 0-22.3-2.6-28.7-6.1l-4.5 12.3c7.5 4.3 20.3 7.8 34.6 7.8 14.8 0 27.6-2.5 34.5-6.8 6.4-3.9 10.1-9.7 10.1-16.7 0-11.8-10.7-18.1-31.1-22.8-14.8-3.4-20.8-6.1-20.8-9.8 0-4.1 6.5-6.8 17.5-6.8 10.4 0 19.3 2.1 25.5 5.1l4.3-11.9zm135.2 60.1V5.9h-15.3v49.8c0 10.3-5.2 15.6-15.3 15.6-10.1 0-15.4-5.3-15.4-15.6V5.9h-15.3v50.9c0 18.2 11.2 28.7 30.7 28.7 19.4 0 30.6-10.5 30.6-28.7zM337 5.9h-15.5l-21.8 38.6L277.9 5.9h-16.7v76.2h15.3V25.1l19.5 34.1h7.3l19.4-34.1v57.1H337V5.9zm80.2 1.3c-5.7-1.1-13.3-1.8-21.7-1.8-13.8 0-25.2 2.2-31.5 5.8-6 3.4-9.3 8.3-9.3 14.2 0 10.9 10.9 17.1 30.1 21.6 15.3 3.5 21.7 5.9 21.7 10.4 0 4.7-6.9 7.6-18.7 7.6-11.4 0-22.3-2.6-28.7-6.1l-4.5 12.3c7.5 4.3 20.3 7.8 34.6 7.8 14.8 0 27.6-2.5 34.5-6.8 6.4-3.9 10.1-9.7 10.1-16.7 0-11.8-10.7-18.1-31.1-22.8-14.8-3.4-20.8-6.1-20.8-9.8 0-4.1 6.5-6.8 17.5-6.8 10.4 0 19.3 2.1 25.5 5.1l4.3-11.9zm13.1 74.9h16.2l34.8-76.2h-16.6l-26.4 59.8L418 5.9h-16.6l34.9 76.2zm81.7-33.1V5.9h-15.3v39.1L476 5.9h-16.4v76.2h15.3V43l31.1 39.1h16.1V49h-15.3v29.1z"/>
        </svg>
    </div>

    <div class="time-display">
        <span id="main-time">00:00</span>
        <span id="seconds">00</span>
    </div>

    <div id="date-display">Loading Date...</div>

    <script>
        function updateClock() {
            const now = new Date();
            
            // Format time
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('main-time').textContent = `${h}:${m}`;
            document.getElementById('seconds').textContent = s;

            // Format date (e.g., THURSDAY, APRIL 2)
            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            document.getElementById('date-display').textContent = now.toLocaleDateString('en-US', options);
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
